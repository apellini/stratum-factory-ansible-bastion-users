---
# molecule/default/molecule.yml — stratum_factory.bastion_users

dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: bastion-users-test
    image: ubuntu:24.04
    pre_build_image: true
    privileged: true
    command: /sbin/init
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent

verifier:
  name: ansible

lint: |
  set -e
  yamllint .
  ansible-lint
