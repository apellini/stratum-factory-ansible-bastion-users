---
# meta/main.yml — stratum_factory.bastion_users

galaxy_info:
  author: apellini
  role_name: bastion_users
  namespace: stratum_factory
  description: >
    Declaratively manages local system users on the STRATUM dev bastion (Ubuntu 24.04).
    Provisions a break-glass SSH user with passwordless sudo and PAM/VPN Linux accounts
    used by ocserv. Optionally hardens sshd (disable password auth).
  license: MIT
  min_ansible_version: "2.15"
  platforms:
    - name: Ubuntu
      versions:
        - all

collections:
  - ansible.builtin
  - ansible.posix

dependencies: []
